<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بكم - شبيبة النجاح</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg">

<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass hero" style="text-align: center; max-width: 600px;">
        <img src="shabiba-logo.png" alt="Logo" style="width: 550px; margin-bottom: 30px;"> <h1 style="font-size: 2.5rem; margin-bottom: 10px; color:var(--primary);">صوت الطالب.. وعي ونضال</h1>
        <p style="font-size: 1.2rem; color: #ccc;">أهلاً بك في المنصة الرسمية لطلاب حركة الشبيبة الطلابية في جامعة النجاح الوطنية.</p>
        
        <div style="margin-top: 30px;">
            <button class="btn-primary" onclick="goLogin()">ابدأ الآن</button>
            <p style="font-size: 0.9rem; margin-top: 15px; opacity: 0.7;">سيتم تحويلك تلقائياً خلال 7 ثوانٍ...</p>
        </div>
    </div>
</div>

<footer>Developed by Mahmoud ALKhader</footer>

<script>
  // نغير الوجهة إلى login.html بدلاً من index.html
  function goLogin(){ location.href = "login.html"; }
  
  // انتقال تلقائي بعد 7 ثوانٍ
  setTimeout(() => { 
      // فحص إذا كان الطالب مسجلاً مسبقاً يذهب للداشبورد فوراً
      if(localStorage.getItem("logged") === "yes") {
          location.href = "dashboard.html";
      } else {
          location.href = "login.html"; 
      }
  }, 7000);
</script>

</body>
</html>
